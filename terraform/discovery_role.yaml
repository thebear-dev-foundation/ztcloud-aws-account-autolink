AWSTemplateFormatVersion: "2010-09-09"
Description: Zscaler Tag Discovery Role for Connector Portal onboarding

Parameters:
  ExternalId:
    Type: String
    Description: Zscaler per-account external id (UUID)
    MinLength: 16

  ZscalerTrustedAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: >
      Zscaler AWS account ID that assumes this role. Source from your Zscaler
      Connector Portal at AWS account onboarding time — the portal displays the
      trusted account ID, expected role name, and your tenant-specific
      external-id together. Do NOT bake a value into source code.

  ZscalerTrustedRoleName:
    Type: String
    Description: >
      Zscaler-side role name (the role in the Zscaler account that assumes this
      role). Source from the Connector Portal alongside the account ID.

Resources:
  ZscalerTagDiscoveryRoleBasic:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ZscalerTagDiscoveryRoleBasic
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${ZscalerTrustedAccountId}:role/${ZscalerTrustedRoleName}"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: ZscalerReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeInstances
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeTags
                  - iam:GetInstanceProfile
                  - iam:ListAttachedRolePolicies
                Resource: "*"

Outputs:
  RoleArn:
    Value: !GetAtt ZscalerTagDiscoveryRoleBasic.Arn
